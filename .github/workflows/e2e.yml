name: Runtime And Quality

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 2 * * *"

jobs:
  runtime-lane:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare environment
        run: |
          cp .env.example .env
          mkdir -p artifacts
          make network-init

      - name: Start LiderAhenk platform
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            make dev-fidelity N=10
          else
            make dev-fast
          fi

      - name: Wait for services
        run: |
          echo "Waiting for services to initialize..."
          sleep 60
          make health

      - name: Run runtime core lane
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            make test-runtime-core PROFILE=dev-fidelity
          else
            make test-runtime-core PROFILE=dev-fast
          fi

      - name: Run nightly operational lane
        if: github.event_name == 'schedule'
        run: |
          make test-runtime-operational PROFILE=dev-fidelity
          make test-runtime-scale N=10
          make test-e2e-management

      - name: Generate quality report
        if: always()
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            PLATFORM_RUNTIME_PROFILE=dev-fidelity make quality-report
          else
            PLATFORM_RUNTIME_PROFILE=dev-fast make quality-report
          fi

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-artifacts
          path: artifacts/
          retention-days: 7

      - name: Stop platform
        if: always()
        run: |
          make stop-all
