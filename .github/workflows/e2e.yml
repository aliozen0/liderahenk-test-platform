name: Quality And E2E

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 2 * * *"

jobs:
  quality-gate:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare environment
        run: |
          cp .env.example .env
          mkdir -p artifacts
          make network-init

      - name: Start LiderAhenk platform
        run: |
          make dev-obs

      - name: Wait for services
        run: |
          echo "Waiting for services to initialize..."
          sleep 60
          make health

      - name: Run observability evidence gate
        run: |
          make test-observability
          make test-evidence

      - name: Run smoke E2E
        run: |
          make test-e2e-smoke

      - name: Run nightly management E2E
        if: github.event_name == 'schedule'
        run: |
          make test-e2e-management

      - name: Generate quality report
        if: always()
        run: |
          make quality-report

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-artifacts
          path: artifacts/
          retention-days: 7

      - name: Stop platform
        if: always()
        run: |
          make stop-all
