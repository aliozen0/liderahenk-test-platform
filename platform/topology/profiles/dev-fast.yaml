name: dev-fast
runtime_profile: dev-fast
ldap_bind_mode: service-account
seed_defaults:
  operators:
    count: 2
    roles:
      - platform-admin
      - ops-operator
  directory_users:
    count: 8
    archetypes:
      - standard
      - privileged
      - restricted
  user_groups:
    count: 3
    archetypes:
      - standard
      - privileged
      - restricted
  endpoint_groups:
    count: 2
    archetypes:
      - standard
      - restricted
  policy_pack: baseline-fast
  session_pack: login-basic
