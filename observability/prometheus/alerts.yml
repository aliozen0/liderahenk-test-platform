# Prometheus Alert Rules ГўвӮ¬вҖқ LiderAhenk SLO
groups:
  - name: liderahenk_slo
    rules:
      - alert: LiderApiDown
        expr: up{job="liderapi"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "liderapi eriГ…Еёilemez"

      - alert: LiderApiHighErrorRate
        expr: |
          rate(http_server_requests_seconds_count{status=~"5.."}[5m]) /
          rate(http_server_requests_seconds_count[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "liderapi 5xx hata oranГ„Вұ %5 ГғВјzerinde"

      - alert: TaskDeliveryLatencyHigh
        expr: |
          histogram_quantile(0.95,
            rate(http_server_requests_seconds_bucket[5m])) > 5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "GГғВ¶rev iletim gecikmesi p95 > 5sn"

      - alert: LiderCoreDown
        expr: up{job="lider-core"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "lider-core JMX exporter eriГ…Еёilemez"

      - alert: ContainerHighMemory
        expr: |
          container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.90
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Konteyner bellek kullanГ„ВұmГ„Вұ %90 ГғВјzerinde"

      - alert: TelemetryPipelineDown
        expr: up{job=~"alloy|platform-exporter|otel-collector"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Telemetry pipeline bileГ…Еёeni eriГ…Еёilemez"

      - alert: SyntheticPlatformProbeFailing
        expr: lider:probe_success_ratio5m{probe=~"jwt_login|dashboard_info|agent_list|computer_tree"} < 0.5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Read-only platform probe baГ…ЕёarГ„Вұ oranГ„Вұ dГғВјГ…ЕёГғВјk"

      - alert: AgentVisibilityDrift
        expr: lider:agent_count_drift > 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Ajan gГғВ¶rГғВјnГғВјrlГғВјГ„ЕёГғВј kaynaklar arasГ„Вұnda tutarsГ„Вұz"
