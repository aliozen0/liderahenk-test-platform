# Prometheus — LiderAhenk Test Ortamı
global:
  scrape_interval:     15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml
  - recording_rules.yml

scrape_configs:
  - job_name: lider-core
    static_configs:
      - targets: ['lider-core:9779']
    metrics_path: /metrics

  - job_name: liderapi
    static_configs:
      - targets: ['liderapi:9779']
    metrics_path: /metrics

  - job_name: ejabberd
    static_configs:
      - targets: ['ejabberd-exporter:9780']
    metrics_path: /metrics

  - job_name: mariadb
    static_configs:
      - targets: ['mysqld-exporter:9104']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: alloy
    static_configs:
      - targets: ['grafana-alloy:12345']
    metrics_path: /metrics

  - job_name: platform-exporter
    static_configs:
      - targets: ['platform-exporter:9790']
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']
    metrics_path: /metrics
