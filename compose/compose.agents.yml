# compose/compose.agents.yml
# LiderAhenk Test Ortamı — Oturum 3: Ajan Servisleri
# compose.core.yml ile birlikte kullanılır

services:
  provisioner:
    build:
      context: ../services/provisioner
      dockerfile: Dockerfile
    depends_on:
      ejabberd:
        condition: service_healthy
      ldap:
        condition: service_healthy
    networks:
      - liderahenk_agents
    environment:
      AHENK_COUNT: ${AHENK_COUNT}
      LDAP_HOST: ldap
      LDAP_PORT: ${LDAP_PORT}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_ADMIN_USERNAME: ${LDAP_ADMIN_USERNAME}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      XMPP_DOMAIN: ${XMPP_DOMAIN}
      XMPP_ADMIN_PASS: ${XMPP_ADMIN_PASS}
      XMPP_AGENT_PASS: ${XMPP_AGENT_PASS}
      LDAP_AGENT_BASE_DN: ${LDAP_AGENT_BASE_DN}
      EJABBERD_API: http://ejabberd:5280/api
    restart: "no"

  ahenk:
    build:
      context: ../services/ahenk
      dockerfile: Dockerfile
      args:
        AHENK_UPSTREAM_SHA: ${AHENK_UPSTREAM_SHA:-c0f216b05c335883d5b35bf606eac39bcb98b4bd}
    depends_on:
      provisioner:
        condition: service_completed_successfully
    networks:
      - liderahenk_agents
    environment:
      AHENK_VERSION: ${AHENK_VERSION}
      CONTAINER_MODE: ${CONTAINER_MODE:-1}
      DEBUG_MODE: ${DEBUG_MODE:-0}
      AHENK_AGENT_MODE: ${AHENK_AGENT_MODE:-semi-privileged}
      AHENK_RUN_AS_ROOT: ${AHENK_RUN_AS_ROOT:-1}
      NETWORK_PORT_RULE_MODE: ${NETWORK_PORT_RULE_MODE:-shadow}
      XMPP_HOST: ejabberd
      XMPP_DOMAIN: ${XMPP_DOMAIN}
      XMPP_RESOURCE: ${XMPP_RESOURCE}
      LIDER_USER: ${LIDER_USER:-lider-admin}
      LIDER_PASS: ${LIDER_PASS:-secret}
      LDAP_HOST: ldap
      LDAP_PORT: ${LDAP_PORT}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      JITTER_MAX_SECONDS: ${JITTER_MAX_SECONDS}
      XMPP_ADMIN_PASS: ${XMPP_ADMIN_PASS}
      XMPP_AGENT_PASS: ${XMPP_AGENT_PASS}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # PORT YAYIMLAMA YOK
    # container_name YOK — ölçeklemeyi engeller

networks:
  liderahenk_agents:
    external: true
    name: liderahenk-test_liderahenk_agents
