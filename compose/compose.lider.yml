# compose/compose.lider.yml
# LiderAhenk Test Ortamı — Oturum 2: Lider Servisleri
# compose.core.yml ile birlikte kullanılır

services:
  lider-core:
    build:
      context: ../services/lidercore
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      ldap:
        condition: service_healthy
      ejabberd:
        condition: service_healthy
    networks:
      - liderahenk_core
      - liderahenk_obs
    environment:
      DB_HOST: mariadb
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      LDAP_HOST: ldap
      LDAP_PORT: ${LDAP_PORT}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_USER_BASE_DN: ${LDAP_USER_BASE_DN:-ou=users,dc=liderahenk,dc=org}
      LDAP_ROLE_BASE_DN: ${LDAP_ROLE_BASE_DN:-ou=Roles,dc=liderahenk,dc=org}
      LDAP_ADMIN_DN: "cn=${LDAP_ADMIN_USERNAME},${LDAP_ROOT}"
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      XMPP_HOST: ejabberd
      XMPP_DOMAIN: ${XMPP_DOMAIN}
      XMPP_RESOURCE: ${XMPP_RESOURCE}
      XMPP_ADMIN_PASS: ${XMPP_ADMIN_PASS}
      LDAP_AGENT_BASE_DN: ${LDAP_AGENT_BASE_DN}
      AHENK_COUNT: ${AHENK_COUNT}
      ENABLE_LEGACY_REGISTRATION_SIM: ${ENABLE_LEGACY_REGISTRATION_SIM:-0}
      LIDER_FEATURE_PROFILE: ${LIDER_FEATURE_PROFILE:-all}
      LIDER_LDAP_BIND_MODE: ${LIDER_LDAP_BIND_MODE:-authenticated-user}
      LIDER_FORCE_LDAP_ADMIN_BIND: ${LIDER_FORCE_LDAP_ADMIN_BIND:-0}
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f karaf || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  liderapi:
    build:
      context: ..
      dockerfile: services/liderapi/Dockerfile
      args:
        LIDERAPI_UPSTREAM_REF: ${LIDERAPI_UPSTREAM_REF:-}
    restart: unless-stopped
    depends_on:
      lider-core:
        condition: service_healthy
    networks:
      - liderahenk_core
      - liderahenk_agents
      - liderahenk_external
      - liderahenk_obs
    ports:
      - "127.0.0.1:8082:8080"
    environment:
      DB_HOST: mariadb
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      LDAP_HOST: ldap
      LDAP_PORT: ${LDAP_PORT}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_ADMIN_USERNAME: ${LDAP_ADMIN_USERNAME}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      XMPP_HOST: ejabberd
      XMPP_DOMAIN: ${XMPP_DOMAIN}
      XMPP_RESOURCE: ${XMPP_RESOURCE}
      XMPP_ADMIN_PASS: ${XMPP_ADMIN_PASS}
      EJABBERD_API: ${EJABBERD_API:-http://ejabberd:5280/api}
      LIDER_LDAP_BIND_MODE: ${LIDER_LDAP_BIND_MODE:-authenticated-user}
      LIDER_FORCE_LDAP_ADMIN_BIND: ${LIDER_FORCE_LDAP_ADMIN_BIND:-0}
      LIDER_FEATURE_PROFILE: ${LIDER_FEATURE_PROFILE:-all}
      # [LIDERUI-2.3.0 BUG FIX] Disable gzip so Nginx sub_filter can rewrite childEntries to children
      SPRING_APPLICATION_JSON: '{"server":{"compression":{"enabled":false}}}'
    healthcheck:
      test: ["CMD-SHELL", "curl -so /dev/null http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 120s

  lider-ui:
    build:
      context: ..
      dockerfile: services/liderui/Dockerfile
      args:
        LIDERUI_UPSTREAM_REF: ${LIDERUI_UPSTREAM_REF:-}
    restart: unless-stopped
    depends_on:
      liderapi:
        condition: service_healthy
    networks:
      - liderahenk_external
    ports:
      - "127.0.0.1:3001:80"
    environment:
      LIDER_API_URL: ${LIDER_API_URL}
      LIDER_API_VERSION: ${LIDER_API_VERSION}
      LIDER_FEATURE_PROFILE: ${LIDER_FEATURE_PROFILE:-all}
      UI_DISABLED_FEATURES: ${UI_DISABLED_FEATURES}

networks:
  liderahenk_core:
    external: true
    name: liderahenk-test_liderahenk_core
  liderahenk_agents:
    external: true
    name: liderahenk-test_liderahenk_agents
  liderahenk_external:
    external: true
    name: liderahenk-test_liderahenk_external
  liderahenk_obs:
    external: true
    name: liderahenk-test_liderahenk_obs
