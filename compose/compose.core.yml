# compose/compose.core.yml
# LiderAhenk Test Ortamı — Oturum 1: Çekirdek Altyapı
# container_name KULLANILMAZ — ölçeklemeyi engeller

networks:
  liderahenk_core:
    driver: bridge
    internal: true
  liderahenk_agents:
    driver: bridge
  liderahenk_obs:
    driver: bridge
  liderahenk_external:
    driver: bridge

volumes:
  mariadb_data:
  ldap_data:

services:
  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ../services/mariadb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - liderahenk_core
    # PORT YAYIMLAMA YOK — sadece iç ağdan erişim
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysql --protocol=TCP -h127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD $$MYSQL_DATABASE -e 'SELECT 1' >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ldap:
    # bitnami/openldap artık Docker Hub'da mevcut değil (discontinue edildi)
    # bitnamilegacy/openldap aynı env vars ve davranışı korur
    image: bitnamilegacy/openldap:latest
    restart: unless-stopped
    environment:
      LDAP_ROOT: ${LDAP_ROOT}
      LDAP_ADMIN_USERNAME: ${LDAP_ADMIN_USERNAME}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_PORT_NUMBER: ${LDAP_PORT}
      LDAP_CUSTOM_SCHEMA_DIR: /schemas
    volumes:
      - ldap_data:/bitnami/openldap
      - ../services/ldap/schema:/schemas:ro
    networks:
      - liderahenk_core
      - liderahenk_agents
    ports:
      - "127.0.0.1:1389:1389"
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost:${LDAP_PORT} -b ${LDAP_BASE_DN} -D cn=${LDAP_ADMIN_USERNAME},${LDAP_ROOT} -w ${LDAP_ADMIN_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # LDAP şema + admin kullanıcısı otomatik yükleyici
  # ldapi:/// soketi ile root yetkili erişim (network_mode: service:ldap)
  ldap-init:
    image: python:3.12-slim
    network_mode: "service:ldap"
    entrypoint: ["/bin/bash", "/scripts/ldap-init.sh"]
    restart: "no"
    environment:
      LDAP_HOST: localhost
      LDAP_PORT: ${LDAP_PORT}
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_ADMIN_USERNAME: ${LDAP_ADMIN_USERNAME}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LIDER_ADMIN_UID: ${LIDER_USER:-lider-admin}
      LIDER_ADMIN_PASS: ${LIDER_PASS:-secret}
    volumes:
      - ../services/ldap/ldap-init.sh:/scripts/ldap-init.sh:ro
      - ../services/ldap/schema:/schemas:ro
    depends_on:
      ldap:
        condition: service_healthy

  ejabberd:
    image: ejabberd/ecs:${EJABBERD_VERSION}
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/entrypoint-ejabberd.sh"]
    environment:
      XMPP_DOMAIN: ${XMPP_DOMAIN}
      EJABBERD_HOST: ${XMPP_HOST}
      XMPP_ADMIN_USER: lider_sunucu
      XMPP_ADMIN_PASS: ${XMPP_ADMIN_PASS}
    volumes:
      - ../services/ejabberd/ejabberd.yml:/home/ejabberd/conf/ejabberd.yml:ro
      - ../services/ejabberd/entrypoint-ejabberd.sh:/entrypoint-ejabberd.sh:ro
    networks:
      - liderahenk_core
      - liderahenk_agents
      - liderahenk_obs
      - liderahenk_external
    ports:
      - "127.0.0.1:15280:5280"
    healthcheck:
      test: ["CMD-SHELL", "/home/ejabberd/bin/ejabberdctl status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s
    depends_on:
      ldap:
        condition: service_healthy
      mariadb:
        condition: service_healthy

  db-migrate:
    image: mariadb:10.11
    restart: "no"
    entrypoint:
      - /bin/sh
      - -ec
      - |
        echo "[db-migrate] mariadb TCP readiness bekleniyor..."
        ready=0
        for attempt in $$(seq 1 60); do
          if mysql \
            --protocol=TCP \
            --connect-timeout=2 \
            --host=mariadb \
            --user="$${MYSQL_USER}" \
            --password="$${MYSQL_PASSWORD}" \
            "$${MYSQL_DATABASE}" \
            -e "SELECT 1" >/dev/null 2>&1; then
            echo "[db-migrate] mariadb hazır (deneme=$${attempt})"
            ready=1
            break
          fi
          sleep 2
        done
        if [ "$${ready}" -ne 1 ]; then
          echo "[db-migrate] HATA: mariadb zamanında hazır olmadı" >&2
          exit 1
        fi
        mysql \
          --protocol=TCP \
          --host=mariadb \
          --user="$${MYSQL_USER}" \
          --password="$${MYSQL_PASSWORD}" \
          "$${MYSQL_DATABASE}" \
          < /migrations/migrate-v1.sql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ../services/mariadb/migrate-v1.sql:/migrations/migrate-v1.sql:ro
    networks:
      - liderahenk_core
    depends_on:
      mariadb:
        condition: service_healthy
