# compose/compose.obs.yml
# LiderAhenk Test Ortamı — Oturum 5: Gözlemlenebilirlik Stack'i
# compose.core.yml ile birlikte kullanılır

services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - liderahenk_obs
      - liderahenk_core
    ports:
      - "127.0.0.1:9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - liderahenk_obs
      - liderahenk_external
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASS:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    volumes:
      - ../observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - liderahenk_obs
    ports:
      - "127.0.0.1:3100:3100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - liderahenk_obs
    privileged: true

  mysqld-exporter:
    image: prom/mysqld-exporter:latest
    restart: unless-stopped
    environment:
      MYSQLD_EXPORTER_PASSWORD: "${MYSQL_PASSWORD}"
    command:
      - --mysqld.address=mariadb:3306
      - --mysqld.username=${MYSQL_USER}
    networks:
      - liderahenk_core
      - liderahenk_obs
    depends_on:
      mariadb:
        condition: service_healthy

  ejabberd-exporter:
    build:
      context: ../services/ejabberd-exporter
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      EJABBERD_API: http://ejabberd:5280/api
      XMPP_DOMAIN: ${XMPP_DOMAIN}
      EXPORTER_PORT: "9780"
    networks:
      - liderahenk_obs
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
