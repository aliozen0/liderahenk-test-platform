# ===========================================================
# ejabberd Yapılandırması — LiderAhenk Test Ortamı
# ===========================================================
# Volume mount: ./services/ejabberd/ejabberd.yml:/home/ejabberd/conf/ejabberd.yml:ro

loglevel: info

hosts:
  - localhost
  - liderahenk.org

# --- Listener ---
listen:
  - port: 5222
    ip: "::"
    module: ejabberd_c2s
    max_stanza_size: 262144
    shaper: none
    access: c2s
    starttls: true

  - port: 5269
    ip: "::"
    module: ejabberd_s2s_in
    max_stanza_size: 524288

  - port: 5443
    ip: "::"
    module: ejabberd_http
    tls: true
    request_handlers:
      /admin: ejabberd_web_admin
      /api: mod_http_api
      /bosh: mod_bosh
      /upload: mod_http_upload
      /ws: ejabberd_http_ws

  - port: 5280
    ip: "::"
    module: ejabberd_http
    request_handlers:
      /api: mod_http_api
      /admin: ejabberd_web_admin

# --- Kimlik Doğrulama ---
auth_method: internal
auth_password_format: plain

# Test ortamı: LiderAPI'nin (Smack 4.1.5) SCRAM-SHA-1 uyumsuzluğu
# sebebiyle `not-authorized` hatası almasını önlemek için SCRAM kapatıldı.
# (Smack PLAIN mekanizmasına fallback yapacak)
auth_use_cache: false
disable_sasl_mechanisms:
  - SCRAM-SHA-1
  - DIGEST-MD5

# --- ACL ---
acl:
  admin:
    user:
      - lider_sunucu@liderahenk.org
  local:
    user_regexp: ""
  loopback:
    ip:
      - 127.0.0.0/8
      - ::1/128
      # Docker iç ağları
      - 172.16.0.0/12
      - 10.0.0.0/8
      - 192.168.0.0/16

# --- Erişim Kuralları ---
access_rules:
  local:
    allow: local
  c2s:
    deny: blocked
    allow: all
  announce:
    allow: admin
  configure:
    allow: admin
  muc_create:
    allow: local
  pubsub_createnode:
    allow: local
  trusted_network:
    allow: loopback
  register:
    allow: loopback

# --- API İzinleri ---
api_permissions:
  "console commands":
    from: ejabberd_ctl
    who: all
    what: "*"
  "admin access":
    from:
      - ejabberd_ctl
      - mod_http_api
    who:
      - acl: loopback
      - acl: admin
    what: "*"

# --- Shaper ---
shaper:
  normal:
    rate: 3000
    burst_size: 20000
  fast:
    rate: 50000
    burst_size: 50000

shaper_rules:
  max_user_sessions: 10
  max_user_offline_messages:
    5000: admin
    100: all
  c2s_shaper:
    none: admin
    normal: all
  s2s_shaper: fast

# --- Modüller ---
modules:
  mod_adhoc: {}
  mod_admin_extra: {}
  mod_announce:
    access: announce
  mod_avatar: {}
  mod_blocking: {}
  mod_bosh: {}
  mod_caps: {}
  mod_carboncopy: {}
  mod_client_state: {}
  mod_configure: {}
  mod_disco: {}
  # mod_fail2ban: {}
  mod_http_api: {}
  mod_http_upload:
    put_url: https://@HOST@:5443/upload
  mod_last: {}
  mod_mam:
    assume_mam_usage: true
    default: always
  mod_muc:
    access:
      - allow
    access_admin:
      - allow: admin
    access_create: muc_create
    access_persistent: muc_create
    default_room_options:
      mam: true
  mod_muc_admin: {}
  mod_offline:
    access_max_user_messages: max_user_offline_messages
  mod_ping: {}
  mod_privacy: {}
  mod_private: {}
  mod_pubsub:
    access_createnode: pubsub_createnode
    plugins:
      - flat
      - pep
    force_node_config:
      storage:pubsub:
        access_model: open
  mod_push: {}
  mod_push_keepalive: {}
  mod_register:
    access: register
    ip_access: trusted_network
  mod_roster:
    versioning: true
  mod_s2s_dialback: {}
  mod_shared_roster: {}
  mod_stream_mgmt:
    resend_on_timeout: if_offline
  mod_stun_disco: {}
  mod_vcard: {}
  mod_vcard_xupdate: {}
  mod_version:
    show_os: false
