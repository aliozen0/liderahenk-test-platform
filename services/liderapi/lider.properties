################### DataSource Configuration ##########################
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:mariadb}:3306/${DB_NAME:liderahenk}?useUnicode=yes&characterEncoding=UTF-8
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:DEGISTIR}

################### Lider URL ##########################
lider.url=http://liderapi:8080

################### Hibernate Configuration ##########################
spring.datasource.initialization-mode=always
spring.main.banner-mode=off
# liderapi kodunda circular dependency var (XMPPMessagingService ↔ TaskStatusSubscriberImpl)
# Spring Boot 3.x bunu varsayılan olarak yasaklar — eski kodu desteklemek için aktif et
spring.main.allow-circular-references=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.current_session_context_class=org.springframework.orm.hibernate5.SpringSessionContext
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
# Hibernate 6.x dialect auto-detection aktif (MySQL57Dialect kaldırıldı)
# spring.jpa.properties.hibernate.dialect otomatik algılama kullanır
server.servlet.session.timeout=30m
spring.jackson.serialization.fail-on-empty-beans=false

################### LDAP Configuration ##############################
ldap.server=${LDAP_HOST:ldap}
ldap.port=${LDAP_PORT:1389}
ldap.username=cn=${LDAP_ADMIN_USERNAME:admin},${LDAP_BASE_DN:dc=liderahenk,dc=org}
ldap.password=${LDAP_ADMIN_PASSWORD:DEGISTIR}
ldap.root.dn=${LDAP_BASE_DN:dc=liderahenk,dc=org}
ldap.use.ssl=false

################### XMPP Configuration ##############################
xmpp.host=${XMPP_HOST:ejabberd}
xmpp.port=5222
xmpp.username=lider_sunucu
xmpp.password=secret
xmpp.resource.name=LiderAPI
xmpp.service.name=${XMPP_DOMAIN:liderahenk.org}
xmpp.presence.priority=1

################### Register Configuration ##########################
registrationSubscriber.class=default

################### Plugin Configuration ############################
allow.connection.without.permission=true
lider.enableDelete4Directory=false

# JWT properties
jwt.secret=${JWT_SECRET:TGlkZXJBaGVua1Rlc3RPcnRhbWkyMDI2Q29rR3V2ZW5saUJpckFuYWh0YXJEaXJCdUtleUpXVFRlc3RLZXlGb3JIUzUxMkFsZ29yaXRobQ==}
jwt.expiration=864000

# Lider Messaging Prop
lider.messaging=xmpp
spring.jpa.show-sql=true
