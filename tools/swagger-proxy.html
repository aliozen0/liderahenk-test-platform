<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>LiderAhenk API Docs</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f7fa; font-family: 'Inter', system-ui, sans-serif; }
    #login-panel {
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; flex-direction: column; gap: 20px;
    }
    #login-panel h1 {
      color: #2d3748; font-size: 1.6rem; font-weight: 600;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #login-panel .card {
      background: #ffffff; border-radius: 12px; padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08); min-width: 360px;
      border: 1px solid #e2e8f0;
    }
    #login-panel input {
      width: 100%; padding: 12px 16px; margin: 8px 0;
      background: #f8fafc; border: 1px solid #cbd5e1;
      border-radius: 8px; color: #1e293b; font-size: 14px;
      outline: none; transition: border 0.3s;
    }
    #login-panel input:focus { border-color: #4f46e5; }
    #login-panel button {
      width: 100%; padding: 12px; margin-top: 16px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none; border-radius: 8px; color: white;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }
    #login-panel button:hover { transform: translateY(-1px); opacity: 0.9; }
    #login-panel .error { color: #dc2626; font-size: 13px; margin-top: 8px; }
    #login-panel .info { color: #94a3b8; font-size: 12px; margin-top: 12px; text-align: center; }
    #swagger-container { display: none; background: #ffffff; }
    .topbar { display: none !important; }
    .swagger-ui .scheme-container { background: #f8fafc; }
  </style>
</head>
<body>

<div id="login-panel">
  <h1>🔑 LiderAhenk API Docs</h1>
  <div class="card">
    <input type="text" id="api-url" value="http://localhost:8082" placeholder="API URL">
    <input type="text" id="username" value="lider-admin" placeholder="Kullanıcı adı">
    <input type="password" id="password" value="secret" placeholder="Şifre">
    <button onclick="doLogin()">Swagger UI Aç</button>
    <div id="error" class="error"></div>
    <div class="info">JWT ile otomatik giriş yapılır</div>
  </div>
</div>

<div id="swagger-container">
  <div id="swagger-ui"></div>
</div>

<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script>
async function doLogin() {
  const apiUrl = document.getElementById('api-url').value;
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('error');
  errorEl.textContent = '';

  try {
    const resp = await fetch(apiUrl + '/api/auth/signin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (!resp.ok) throw new Error('Login başarısız: ' + resp.status);
    const data = await resp.json();
    const token = data.token;
    if (!token) throw new Error('Token alınamadı');

    // Swagger UI'ı başlat
    document.getElementById('login-panel').style.display = 'none';
    document.getElementById('swagger-container').style.display = 'block';

    SwaggerUIBundle({
      url: apiUrl + '/v3/api-docs',
      dom_id: '#swagger-ui',
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
      layout: 'BaseLayout',
      deepLinking: true,
      requestInterceptor: (req) => {
        req.headers['Authorization'] = 'Bearer ' + token;
        return req;
      }
    });
  } catch (e) {
    errorEl.textContent = e.message;
  }
}
</script>
</body>
</html>
